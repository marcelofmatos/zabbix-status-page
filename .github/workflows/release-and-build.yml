name: 🚀 Release and build

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Type of version increment"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Git
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"

      - name: 🔢 Calculate new version
        id: version
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT_VERSION="0.0.0"
          else
            CURRENT_VERSION="$LATEST_TAG"
          fi
          echo "Current version: $CURRENT_VERSION"
          if [ "$CURRENT_VERSION" = "0.0.0" ]; then
            NEW_VERSION="1.0.0"
          else
            MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
            case "$VERSION_TYPE" in
              "major") NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              "minor") NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              "patch") NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi
          echo "New version: $NEW_VERSION"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 📝 Get Recent Changes
        id: changes
        run: |
          CURRENT="${{ steps.version.outputs.current_version }}"
          if [ "$CURRENT" = "0.0.0" ]; then
            CHANGES=$(git log --oneline --no-merges -20 | sed 's/^/- /' | head -10)
          else
            CHANGES=$(git log "$CURRENT"..HEAD --oneline --no-merges | sed 's/^/- /' | head -20)
          fi
          if [ -z "$CHANGES" ]; then
            CHANGES="- Minor updates and improvements"
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 🏷️ Create and push tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION already exists"
          else
            git tag "$NEW_VERSION"
            git push origin "$NEW_VERSION"
          fi

      - name: 📋 Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CURRENT_VERSION: ${{ steps.version.outputs.current_version }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          CHANGES: ${{ steps.changes.outputs.changelog }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Release $NEW_VERSION already exists"
          else
            MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
            MINOR_VERSION="$MAJOR.$(echo "$NEW_VERSION" | cut -d. -f2)"
            RELEASE_NOTES=$(cat << EOF
          ## $NEW_VERSION

          ### 🚀 What's Changed

          $CHANGES

          ### 🐳 Docker Images

          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$NEW_VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$MINOR_VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$MAJOR
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          \`\`\`

          Serves on port **8080**. Configure via \`.env\` (see the README) and mount a
          \`./data\` volume for the uptime history.

          **Platforms**: linux/amd64

          ### 📋 Release Info
          - **Type**: $VERSION_TYPE release
          - **Previous Version**: $CURRENT_VERSION
          - **Released by**: @${{ github.actor }}
          EOF
          )
            gh release create "$NEW_VERSION" \
              --title "$NEW_VERSION" \
              --notes "$RELEASE_NOTES" \
              --draft=false \
              --latest \
              $PRERELEASE_FLAG
          fi

  build:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧮 Generate semantic tags
        id: semantic_tags
        run: |
          git fetch --tags
          NEW_VERSION=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
          echo "Full version: $NEW_VERSION"
          echo "major_version=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor_version=$MAJOR.$MINOR" >> $GITHUB_OUTPUT
          echo "full_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.semantic_tags.outputs.full_version }}
            type=raw,value=${{ steps.semantic_tags.outputs.minor_version }}
            type=raw,value=${{ steps.semantic_tags.outputs.major_version }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Zabbix Status Page
            org.opencontainers.image.description=Public status page fed by the Zabbix API
            org.opencontainers.image.vendor=marcelofmatos
            org.opencontainers.image.licenses=MIT

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.semantic_tags.outputs.full_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Generate summary
        run: |
          NEW_VERSION="${{ steps.semantic_tags.outputs.full_version }}"
          echo "## ✅ Release $NEW_VERSION built and pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
